name: Beta Build

on:
  push:
    branches: [beta]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Beta Release
    runs-on: windows-latest
    env:
      HAS_CODESIGN_SECRETS: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 != '' && secrets.WINDOWS_CODESIGN_PFX_PASSWORD != '' }}

    steps:
      - uses: actions/checkout@v5

      - name: Parse version from CHANGELOG.md
        id: ver
        run: python .github/scripts/parse_version.py $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Validate beta version format
        shell: pwsh
        run: |
          $type = "${{ steps.ver.outputs.type }}"
          if ($type -ne "beta") {
            Write-Error "CHANGELOG.md 최신 항목이 beta 형식이 아닙니다: ${{ steps.ver.outputs.display }}"
            Write-Error "예시: ## [beta-v26.04.03.0001] - 2026-04-07"
            exit 1
          }

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - run: npm ci

      - name: Inject version into Cargo.toml
        shell: pwsh
        run: |
          $semver = "${{ steps.ver.outputs.semver }}"
          $content = Get-Content src-tauri/Cargo.toml -Raw
          $content = [regex]::Replace($content, '(?m)^version = "[\d\.\-a-z]+"', "version = `"$semver`"")
          Set-Content src-tauri/Cargo.toml $content

      - name: Inject version into tauri.conf.json
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $conf.version = "${{ steps.ver.outputs.semver }}"
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: Build Tauri portable EXE
        run: npm run tauri build -- --no-bundle
        env:
          TAURI_DISPLAY_VERSION: ${{ steps.ver.outputs.display }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename EXE
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.display }}"
          $src = Get-ChildItem "src-tauri/target/release/*.exe" |
                 Where-Object { $_.Name -notlike "*build*" } |
                 Select-Object -First 1
          if (-not $src) {
            Write-Error "베타 EXE를 찾을 수 없습니다."
            exit 1
          }
          Copy-Item $src.FullName "VM-Compatibility-Tool-${version}.exe"

      - name: Sign EXE with internal certificate
        if: env.HAS_CODESIGN_SECRETS == 'true'
        shell: pwsh
        env:
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}
          WINDOWS_CODESIGN_TIMESTAMP_URL: ${{ secrets.WINDOWS_CODESIGN_TIMESTAMP_URL }}
        run: |
          .\.github\scripts\sign_windows_binary.ps1 `
            -Files "VM-Compatibility-Tool-${{ steps.ver.outputs.display }}.exe"

      - name: Signing summary (enabled)
        if: env.HAS_CODESIGN_SECRETS == 'true'
        shell: pwsh
        run: |
          echo "## 🔏 Code signing" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "- Internal/self-signed PFX signing: enabled" >> $env:GITHUB_STEP_SUMMARY
          echo "- End-user PCs must trust the internal root/intermediate certificate to avoid unknown publisher warnings." >> $env:GITHUB_STEP_SUMMARY

      - name: Signing summary (skipped)
        if: env.HAS_CODESIGN_SECRETS != 'true'
        shell: pwsh
        run: |
          echo "## ⚠️ Code signing skipped" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "- Set WINDOWS_CODESIGN_PFX_BASE64 and WINDOWS_CODESIGN_PFX_PASSWORD to enable internal signing." >> $env:GITHUB_STEP_SUMMARY

      - name: Write beta release notes
        shell: python
        run: |
          import textwrap
          body = textwrap.dedent("""\
          ## 베타 빌드

          ${{ steps.ver.outputs.body }}

          ---
          > ⚠️ 이 빌드는 베타 버전입니다. 검증 목적으로만 사용하세요.
          >
          > 실행 시 Windows SmartScreen 경고가 표시될 수 있습니다.
          > 내부 배포본이 맞다면 `추가 정보` → `실행` 순서로 진행하세요.
          > 항상 관리자 권한으로 실행하세요.
          """)
          with open("beta_release_body.md", "w", encoding="utf-8") as f:
              f.write(body)

      - name: Create or update Beta Pre-release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.ver.outputs.display }}"
          $asset = "VM-Compatibility-Tool-${{ steps.ver.outputs.display }}.exe"
          $existing = gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag `
              --title $tag `
              --notes-file "beta_release_body.md" `
              --prerelease
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset `
              --title $tag `
              --notes-file "beta_release_body.md" `
              --prerelease `
              --target "${{ github.sha }}"
          }
